description: The Business Partner Agent looks up business partners and customers from S/4HANA on behalf of the logged-in user (principal propagation via SAML Bearer through the BTP destination service).
target:
  name: bp_agent_function
  type: function
  parameters:
    - name: agent_context_id
      value: $capability_context.agent_context_id
    - name: agent_task_id
      value: $capability_context.agent_task_id

capability_context:
  - name: agent_context_id
    value: $target_result.agent_context_id
  - name: agent_task_id
    value: $target_result.agent_task_id
